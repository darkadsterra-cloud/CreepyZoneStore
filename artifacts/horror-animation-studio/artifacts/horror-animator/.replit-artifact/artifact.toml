kind = "web"
previewPath = "/"
title = "Horror Animation Studio"
version = "1.0.0"
id = "artifacts/horror-animator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20530

[services.development]
run = "pnpm --filter @workspace/horror-animator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/horror-animator", "run", "build" ]
publicDir = "artifacts/horror-animator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20530"
BASE_PATH = "/"
